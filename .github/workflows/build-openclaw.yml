name: Build OpenClaw Image

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/build-openclaw.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/build-openclaw.yml'
  workflow_dispatch:
  schedule:
    # Build weekly on Sunday at 00:00 UTC to keep the image up to date
    - cron: '0 0 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/openclaw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout OpenClaw repository
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get OpenClaw commit SHA
        id: openclaw
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "sha_long=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.openclaw.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.openclaw.outputs.sha_long }}
            org.opencontainers.image.source=https://github.com/openclaw/openclaw

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
